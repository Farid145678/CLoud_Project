{% extends "base.html" %}
{% block title %}All Users · Admin · ShopCloud{% endblock %}
{% block content %}
<div class="page-header">
  <h2>All Users</h2>
  <a href="{{ url_for('admin.overview') }}" class="btn">← Back</a>
</div>
<table class="table">
  <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Joined</th></tr></thead>
  <tbody>
    {% for u in users %}
      <tr>
        <td>{{ u.id }}</td>
        <td>{{ u.full_name }}</td>
        <td>{{ u.email }}</td>
        <td><span class="role-badge role-{{ u.role }}">{{ u.role }}</span></td>
        <td>{{ u.created_at.strftime('%Y-%m-%d') }}</td>
      </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
